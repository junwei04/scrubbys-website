name: Fetch Google Reviews

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch reviews
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: python3 scripts/fetch_reviews.py
      - name: Commit if changed
        run: |
          git config user.name "scrubbys-bot"
          git config user.email "actions@github.com"
          git add assets/data/reviews.json
          git diff --staged --quiet || git commit -m "Update Google reviews"
          git push
